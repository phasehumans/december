services:
    postgres:
        image: postgres:16
        container_name: phasehumans-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: phasehumans
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    postgres-test:
        image: postgres:16
        container_name: phasehumans-postgres-test
        restart: no
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: phasehumans_test
        ports:
            - '5433:5432'

volumes:
    postgres_data:
