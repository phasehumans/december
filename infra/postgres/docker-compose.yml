services:
    postgres:
        image: postgres:16
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: december
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    postgres-test:
        image: postgres:16
        restart: no
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: december_test
        ports:
            - '5434:5432'
        tmpfs:
            - /var/lib/postgresql/data

volumes:
    postgres_data:
