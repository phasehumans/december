services:
    minio:
        image: minio/minio:latest
        container_name: december-minio
        restart: unless-stopped
        ports:
            - '9000:9000' # S3 API
            - '9001:9001' # Web console
        environment:
            MINIO_ROOT_USER: decemberadmin
            MINIO_ROOT_PASSWORD: minio@2004
        volumes:
            - ./data:/data
        command: server /data --console-address ":9001"
