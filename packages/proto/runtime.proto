syntax = "proto3";

package december.runtime;

service RuntimeService {
    // VM Lifecycle
    rpc CreateVM (CreateVMRequest) returns (CreateVMResponse);
    rpc DestroyVM (DestroyVMRequest) returns (DestroyVMResponse);

    // Command Execution
    rpc ExecuteCommand (ExecuteCommandRequest) returns (stream CommandOutput);
    
    // Agent Lifecycle
    rpc StartAgentSession (SessionConfig) returns (stream SidecarEvent);
    rpc SendControl (ControlMessage) returns (ControlAck);
    rpc InterruptSession (InterruptRequest) returns (InterruptResponse);
}

message CreateVMRequest {
    string vm_id = 1;
    string workspace_zip_url = 2; // MinIO pre-signed GET URL for handoff resumption
    string sidecar_binary_url = 3;
}

message CreateVMResponse {
    bool success = 1;
    string error_message = 2;
}

message DestroyVMRequest {
    string vm_id = 1;
}

message DestroyVMResponse {
    bool success = 1;
}

message ExecuteCommandRequest {
    string vm_id = 1;
    string command = 2;
}

message CommandOutput {
    string chunk = 1;
    int32 exit_code = 2; // set only when command finishes
}

message SecretPair {
    string name = 1;
    string value = 2;
}

message SessionConfig {
    string vm_id = 1;
    repeated string prompts = 2;
    string workspace_directory = 3;
    string model_settings = 4;
    string provider_settings = 5;
    repeated SecretPair secrets = 6;
    string temp_jwt_token = 7;
    string api_host_url = 8;
}

message SidecarEvent {
    string type = 1;
    string data = 2; // JSON
}

message ControlMessage {
    string vm_id = 1;
    string action = 2;
    string payload = 3;
}

message ControlAck {
    bool success = 1;
}

message InterruptRequest {
    string vm_id = 1;
}

message InterruptResponse {
    bool success = 1;
}
